<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация — ДронБоровичи</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Тот же фон, что на главной */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 150, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(255, 215, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -2;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #0066ff;
            top: -100px;
            right: -100px;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: #d4a843;
            bottom: -50px;
            left: -50px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Карточка авторизации */
        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7);
            transition: 0.3s;
        }

        /* Логотип */
        .auth-logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .auth-logo a {
            text-decoration: none;
            color: #fff;
        }
        .auth-logo .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .auth-logo .logo-text span {
            color: #d4a843;
        }
        .auth-logo .logo-sub {
            font-size: 13px;
            color: #495670;
            margin-top: 5px;
            letter-spacing: 3px;
        }

        /* Переключатель табов */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8892b0;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn.active {
            background: #d4a843;
            color: #0a0a0f;
            box-shadow: 0 10px 30px -10px rgba(212, 168, 67, 0.3);
        }
        .tab-btn:hover:not(.active) {
            color: #fff;
        }

        /* Формы */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8892b0;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #d4a843;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 30px rgba(212, 168, 67, 0.05);
        }
        .form-group input::placeholder {
            color: #495670;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 25px;
        }
        .form-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #8892b0;
            cursor: pointer;
        }
        .form-options label input[type="checkbox"] {
            accent-color: #d4a843;
            width: 16px;
            height: 16px;
        }
        .form-options a {
            color: #d4a843;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
        }
        .form-options a:hover {
            color: #e6c35c;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #d4a843;
            border: none;
            border-radius: 60px;
            color: #0a0a0f;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px -10px rgba(212, 168, 67, 0.3);
        }
        .btn-submit:hover {
            background: #e6c35c;
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(212, 168, 67, 0.4);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #495670;
        }
        .auth-footer a {
            color: #d4a843;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            color: #e6c35c;
        }

        /* Скрытие форм */
        .form-panel {
            display: none;
        }
        .form-panel.active {
            display: block;
        }

        /* Разделитель с дроном */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #495670;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 20px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .social-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            color: #8892b0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        /* Город внизу */
        .city-badge {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #495670;
            letter-spacing: 1px;
        }
        .city-badge span {
            color: #d4a843;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 28px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .social-login {
                flex-direction: column;
            }
            .social-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="auth-card">

            <!-- Логотип с ссылкой на главную -->
            <div class="auth-logo">
                <a href="index.html">
                    <div class="logo-text">🚁 <span>Dron</span>Borovichi</div>
                    <div class="logo-sub">✦ доставка еды с неба ✦</div>
                </a>
            </div>

            <!-- Табы -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <!-- ФОРМА ВХОДА -->
            <div class="form-panel active" id="login">
                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label>📧 Email или телефон</label>
                        <input type="text" placeholder="example@mail.ru" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Пароль</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" checked> Запомнить меня
                        </label>
                        <a href="#">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="btn-submit">Войти →</button>
                </form>

                <div class="divider">или</div>

                <div class="social-login">
                    <button class="social-btn">📱 Telegram</button>
                    <button class="social-btn">📧 Почта</button>
                </div>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div class="form-panel" id="register">
                <form id="registerForm" onsubmit="return false;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>👤 Имя</label>
                            <input type="text" placeholder="Алексей" required>
                        </div>
                        <div class="form-group">
                            <label>📱 Телефон</label>
                            <input type="text" placeholder="+7 999 999-99-99" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>📧 Email</label>
                        <input type="email" placeholder="alex@mail.ru" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Пароль</label>
                        <input type="password" placeholder="Минимум 8 символов" required>
                    </div>
                    <div class="form-group">
                        <label>🔒 Подтверждение пароля</label>
                        <input type="password" placeholder="Введите ещё раз" required>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" required> Я соглашаюсь с <a href="#" style="margin-left: 4px;">правилами</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit">Создать аккаунт 🚀</button>
                </form>

                <div class="divider">или</div>

                <div class="social-login">
                    <button class="social-btn">📱 Telegram</button>
                    <button class="social-btn">📧 Почта</button>
                </div>
            </div>

            <div class="auth-footer">
                <span id="switchText">Уже есть аккаунт?</span>
                <a href="#" id="switchLink">Войти</a>
            </div>

            <div class="city-badge">
                🏙️ работает в <span>Боровичах</span> · 53°58' N
            </div>
        </div>
    </div>

    <script>
        // Переключение табов
        const tabBtns = document.querySelectorAll('.tab-btn');
        const panels = {
            login: document.getElementById('login'),
            register: document.getElementById('register')
        };
        const switchLink = document.getElementById('switchLink');
        const switchText = document.getElementById('switchText');

        function switchTab(tab) {
            // Обновляем кнопки
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            // Обновляем панели
            Object.keys(panels).forEach(key => {
                panels[key].classList.toggle('active', key === tab);
            });
            // Обновляем текст в футере
            if (tab === 'login') {
                switchText.textContent = 'Нет аккаунта?';
                switchLink.textContent = 'Зарегистрироваться';
            } else {
                switchText.textContent = 'Уже есть аккаунт?';
                switchLink.textContent = 'Войти';
            }
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        switchLink.addEventListener('click', (e) => {
            e.preventDefault();
            const current = document.querySelector('.form-panel.active');
            if (current.id === 'login') {
                switchTab('register');
            } else {
                switchTab('login');
            }
        });

        // Обработка отправки форм (заглушка)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('🔐 Вход выполнен (демо). Добро пожаловать в ДронБоровичи!');
            // Здесь будет редирект на index.html
            // window.location.href = 'index.html';
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('🎉 Регистрация успешна (демо)! Добро пожаловать в ДронБоровичи!');
            // Здесь будет редирект на index.html
            // window.location.href = 'index.html';
        });
    </script>

</body>
</html>
